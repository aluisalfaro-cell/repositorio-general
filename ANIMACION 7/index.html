<html>
<head>
<title>Programas Cp</title>
<style>
*{
    padding: 0;
    margin: 0;
}
.contenedor{
    width: 600px;
    height: 300px;
    border: 2px solid black;
    margin: 50px auto;
    position: relative;
    overflow: hidden;
}

.tarjeta1, .tarjeta2, .tarjeta3{
    width: 200px;
    height: 300px;
    position: absolute;
    background-size: cover;
    background-position: center;
}

.tarjeta1{
    background-image: url(img/CSS3.jpg);
    left: 0px;
    top: -300px;
    animation: tarjeta1 2s forwards;
}
.tarjeta2{
    background-image: url(img/HTML.jpg);
    left: -200px;
    top: 0px;
    animation: tarjeta2 2s forwards 2s;
}
.tarjeta3{
    background-image: url(img/JS.jpg);
    left: 600px;
    top: 0px;
    animation: tarjeta3 2s forwards 4s;
}

@keyframes tarjeta1{
    0%{
        top: -300px;
        transform: rotate(180deg);
    }

    100%{
        top: 0px;
    }
}
@keyframes tarjeta2{
    0%{
        left: -200px;
        transform: scale(0);
    }

    100%{
        left: 200px;
    }
}
@keyframes tarjeta3{
    0%{
        left: 600px;
        transform: rotateY(180deg);
    }

    100%{
        left: 400px;
    }
}

/*EVENTO*/

.tarjeta1:hover{
    transition: 1s;
    scale: 1.1;
    z-index: 1;
}
.tarjeta2:hover{
    transition: 1s;
    scale: 1.1;
    z-index: 1;
}
.tarjeta3:hover{
    transition: 1s;
    scale: 1.1;
    z-index: 1;
}

</style>
</head>
<body>

<div class="contenedor">
    <div class="tarjeta1"></div>
    <div class="tarjeta2"></div>
    <div class="tarjeta3"></div>

</div>
</body>
</html>
