<html>
    <head>
        <style>
            *{
                margin:0px;
                padding: 0px;
            }
            body{
                background-color: black;
            }
            .contenedor{
                width: 400px;
                height: 700px;
                background-color: rgb(255, 208, 0);
                position: relative;
                overflow: hidden;
                margin:0 auto;
            }
            .texto1{
            width: 200px;
            height: 100px;
            position: absolute;
            top: 200px;
            left: -500px;
            font-size: 28px;
            font-family: "Agency FB";
            font-weight: bold;
            animation: texto1 5s forwards 2s;
        }
        @keyframes texto1{
            0%{
                left: -500px;
                top: 250px;
            }
            50%{
                left: 10px;
                top: 250px;
            }
            80%{
                left: 10px;
                top: 250px;
            }
            100%{
                left: -500px;
                top: 250px;
            }
        }
        .texto2{
            position: absolute;
            top: 240px;
            left: 1000px;
            font-size: 55px;
            font-family: Arial, sans-serif;
            font-weight: 900;
            color: white;
            line-height: 1;
            animation: texto2 5s forwards 2s;
        }
        @keyframes texto2{
            0%{
                left: 1000px;
                top: 280px;
            }
            50%{
                left: 10px;
                top: 280px;
            }
            80%{
                left: 10px;
                top: 280px;
            }
            100%{
                left: 1000px;
                top: 280px;
            }
        }
        .texto3{
            position: absolute;
            top: 240px;
            left: 1000px;
            font-size: 80px;
            font-family: Arial, sans-serif;
            font-weight: 900;
            color: white;
            line-height: 1;
            animation: texto3 5s forwards 2s;
            animation-delay: 6s;
        }
        @keyframes texto3{
            0%{
                left: 1000px;
                top: 240px;
            }
            50%{
                left: 50px;
                top: 240px;
            }
            80%{
                left: 50px;
                top: 240px;
            }
            100%{
                left: 1000px;
                top: 240px;
            }
        }
        .texto4{
            position: absolute;
            top: 300px;
            left: 1000px;
            font-size: 60px;
            font-family: Arial, sans-serif;
            font-weight: 900;
            color: #3b2000;
            line-height: 1;
            animation: texto4 5s forwards 2s;
            animation-delay: 6.5s;
        }
        @keyframes texto4{
            0%{
                left: 1000px;
                top: 300px;
            }
            50%{
                left: 160px;
                top: 300px;
            }
            80%{
                left: 160px;
                top: 300px;
            }
            100%{
                left: 1000px;
                top: 300px;
            }
        }
        .texto5{
            position: absolute;
            top: 340px;
            left: 1000px;
            font-size: 70px;
            font-family: Arial, sans-serif;
            font-weight: 900;
            color: white;
            line-height: 1;
            animation: texto5 5s forwards 2s;
            animation-delay: 7s;
        }
        @keyframes texto5{
            0%{
                left: 1000px;
                top: 340px;
            }
            50%{
                left: 30px;
                top: 340px;
            }
            80%{
                left: 30px;
                top: 340px;
            }
            100%{
                left: 1000px;
                top: 340px;
            }
        }
            
            .cuadrito1{
                height: 100px;
                width: 110px;
                background-image: url(img/coco.png);
                background-size: cover;
                position: absolute;
                left:100px;
                top:-120px;

                animation: cuadrito1 4s infinite forwards 1s;
            }
            @keyframes cuadrito1{
                0%{
                    top:-100px;
                }
                50%{
                    top:200px;
                    rotate:-10deg;
                }
                55%{
                    top:180px;
                }
                80%{
                    top:200px;
                }
                100%{
                    top:700px;
                    rotate:0deg;
                }
            }

            .cuadrito2{
                height: 150px;
                width: 150px;
                background-image: url(img/coco2.png);
                background-size: cover;
                position: absolute;
                left:-10px;
                top:-140px;
                animation: cuadrito2 4s infinite forwards 1s;
            }
            @keyframes cuadrito2{
                0%{
                    top:-100px;
                }
                50%{
                    top:400px;
                    rotate: 10deg;
                }
                55%{
                    top:450px;
                }
                80%{
                    top:480px;
                }
                100%{
                    top:700px;
                    rotate:0deg;
                }
            }
            .cuadrito3{
                height: 150px;
                width: 150px;
                background-image: url(img/coco3.png);
                background-size: cover;
                position: absolute;
                left: 250px;
                top: -140px;
                animation: cuadrito2 4s infinite forwards 1s;
            }
            @keyframes cuadrito3{
                0%{
                    top:-100px;
                }
                50%{
                    top:400px;
                    rotate: 10deg;
                }
                55%{
                    top:450px;
                }
                80%{
                    top:480px;
                }
                100%{
                    top:700px;
                    rotate:0deg;
                }
            }

            .palmera{
                width: 400px;
                height: 500px;
                background-image: url(img/palmera.png);
                background-size: cover;
                position: absolute;
                left:110px;
                top:-170px;
                rotate: 10deg;
                animation: palmera 1.5s infinite alternate linear;
            }
            @keyframes palmera {
                from{
                    rotate:10deg;
                }
                to{
                    rotate:22deg;
                }
            }
        </style>
    </head>
    <body>
        <div class="contenedor">
            <div class="palmera"></div>
            <div class="cuadrito1"></div>            
            <div class="cuadrito2"></div>            
            <div class="cuadrito3"></div>            
            <div class="cuadrito4"></div>    
            <div class="texto1">YA PROBASTE</div>
            <div class="texto2">EL NUEVO<br>SABOR</div>
            <div class="texto3">COCO</div>
            <div class="texto4">+</div>
            <div class="texto5">VAINILLA</div>        
        </div>
    </body>
</html>
