<html>
<head>
    <title></title>
    <style>
    *{
        margin:0;
        padding:0;
    }
    #contenedor{
        width: 400px;
        height: 200px;
        border: 1px solid black;
        position:relative;
        margin:0 auto; /*centrar el contenedor*/
        overflow: hidden; /*oculta todo lo que contiene*/
    }
    #cuadrito{
        width: 100px;
        height: 100px;
        background-color: rgb(160, 8, 21);
        position: absolute; /*obligatorio para mover el div*/
        top: 50px;
        right: -100px;

        animation: cuadrito 3s infinite;
        animation-timing-function: linear; /*define la forma de moverse*/
    }
    @keyframes cuadrito{
        from{
            right: -100;

        }
        to{
            right: 500px;

        }
        
    }

    </style>
</head>
<body>
    <div id="contenedor">

        <div id="cuadrito"></div>

    </div>
</body>
</html>
